services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arkdar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arkdar_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-arkdar}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
